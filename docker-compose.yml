version: "3.8"

networks:
  analytics-net:
    driver: bridge

volumes:
  hbase_data:

services:

  # ── ZOOKEEPER ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT}
    networks: [analytics-net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${ZOOKEEPER_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KAFKA ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT}:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ${ZOOKEEPER_HOST}:${ZOOKEEPER_PORT}
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [analytics-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── HBASE ────────────────────────────────────────────────────────
  hbase:
    image: dajobe/hbase
    container_name: hbase
    hostname: hbase
    restart: unless-stopped
    ports:
      - "16000:16000"
      - "16010:16010"
    volumes:
      - hbase_data:/data
    networks: [analytics-net]
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/localhost/9090"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── HDFS ─────────────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: unless-stopped
    environment:
      - CLUSTER_NAME=${CLUSTER_NAME}
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_blocksize=2097152
    ports:
      - "9870:9870"
      - "9000:9000"
    networks: [analytics-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 20s
      timeout: 10s
      retries: 5

  datanode-1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-1
    restart: unless-stopped
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      namenode:
        condition: service_healthy
    networks: [analytics-net]

  datanode-2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-2
    restart: unless-stopped
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      namenode:
        condition: service_healthy
    networks: [analytics-net]

  datanode-3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-3
    restart: unless-stopped
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      namenode:
        condition: service_healthy
    networks: [analytics-net]

  # ── SPARK ────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    depends_on:
      namenode:
        condition: service_healthy
    networks: [analytics-net]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker ${SPARK_MASTER}
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_HOSTNAME=spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
      datanode-1:
        condition: service_started
    networks: [analytics-net]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker ${SPARK_MASTER}
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_HOSTNAME=spark-worker-2
    depends_on:
      spark-master:
        condition: service_healthy
      datanode-2:
        condition: service_started
    networks: [analytics-net]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  spark-worker-3:
    image: apache/spark:3.5.0
    container_name: spark-worker-3
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker ${SPARK_MASTER}
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_HOSTNAME=spark-worker-3
    depends_on:
      spark-master:
        condition: service_healthy
      datanode-3:
        condition: service_started
    networks: [analytics-net]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  # ── TWEET SIMULATOR ──────────────────────────────────────────────
  simulator:
    build: ./simulator
    container_name: simulator
    restart: unless-stopped
    environment:
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_PORT: 29092
      TWEET_RATE: ${TWEET_RATE}
    depends_on:
      kafka:
        condition: service_healthy
    networks: [analytics-net]

  # ── SPARK STREAMING JOB ──────────────────────────────────────────
  spark-streaming:
    build: ./spark
    container_name: spark-streaming
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-submit", "--master", "${SPARK_MASTER}", "--packages", "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0", "--py-files", "/opt/spark/work-dir/sentiment.py", "/opt/spark/work-dir/streaming_job.py"]
    environment:
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_PORT: 29092
      HBASE_HOST: ${HBASE_HOST}
      HBASE_PORT: ${HBASE_PORT}
      SPARK_MASTER: ${SPARK_MASTER}
    depends_on:
      kafka:
        condition: service_healthy
      hbase:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    networks: [analytics-net]

  # ── SPARK BATCH JOB (scheduled hourly) ───────────────────────────
  spark-batch:
    build: ./spark
    container_name: spark-batch
    restart: unless-stopped
    command: ["python", "/opt/spark/work-dir/scheduler.py"]
    environment:
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_PORT: 29092
      HBASE_HOST: ${HBASE_HOST}
      HBASE_PORT: ${HBASE_PORT}
      SPARK_MASTER: ${SPARK_MASTER}
      BATCH_INTERVAL_MINUTES: ${BATCH_INTERVAL_MINUTES:-60}
    depends_on:
      kafka:
        condition: service_healthy
      hbase:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    networks: [analytics-net]

  # ── HBASE WRITER ─────────────────────────────────────────────────
  ingestion:
    build: ./ingestion
    container_name: ingestion
    restart: unless-stopped
    environment:
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_PORT: 29092
      HBASE_HOST: ${HBASE_HOST}
      HBASE_PORT: ${HBASE_PORT}
    depends_on:
      kafka:
        condition: service_healthy
      hbase:
        condition: service_healthy
    networks: [analytics-net]

  # ── FASTAPI ──────────────────────────────────────────────────────
  fastapi:
    build: ./backend
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      HBASE_HOST: ${HBASE_HOST}
      HBASE_PORT: ${HBASE_PORT}
      KAFKA_HOST: ${KAFKA_HOST}
      KAFKA_PORT: ${KAFKA_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      hbase:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [analytics-net]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT}/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── REACT FRONTEND ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      fastapi:
        condition: service_healthy
    networks: [analytics-net]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
